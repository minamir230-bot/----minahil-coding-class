<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L02 formatter lab</title>
    </head>
    <body>
        <!--Lets's try using various formatting-->
        <b>this is bold text</b> <br>
        <strong>this is also bold text</strong> <br>

        <i>this is italic text</i> <br>
        <mark>this is highlighted text</mark> <br>

        <small>tis is small text</small> <br>

        <del>this is strike-through text</del> <br>

        Math Formula x<sup>2</sup>. <br>
        Chemistry Formula CO<sub>2</sub> <br>


        <blockquote>
            this is quotation
        </blockquote>
  
    </body>
</html>
